services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "VanalyticsD3v!"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'VanalyticsD3v!' -C -Q 'SELECT 1' -b
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: src/Vanalytics.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Database=Vanalytics;User Id=sa;Password=VanalyticsD3v!;TrustServerCertificate=True"
      ADMIN_EMAIL: "admin@vanalytics.com"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "Admin123!"
      Jwt__Secret: "DockerDevSecretKeyThatIsAtLeast32BytesLongForHmacSha256!!"
      Jwt__Issuer: "Vanalytics"
      Jwt__Audience: "Vanalytics"
      Jwt__AccessTokenExpirationMinutes: "15"
      Jwt__RefreshTokenExpirationDays: "7"
      ItemImages__BasePath: "/app/item-images"
      AzureStorage__ConnectionString: "${AZURE_STORAGE_CONNECTION_STRING:-}"
    volumes:
      - itemimages:/app/item-images
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: src/Vanalytics.Web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      API_PROXY_TARGET: "http://api:8080"
    depends_on:
      - api

volumes:
  sqldata:
  itemimages:
