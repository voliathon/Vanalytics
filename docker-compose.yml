services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${MSSQL_SA_PASSWORD}' -C -Q 'SELECT 1' -b
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: src/Vanalytics.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=db;Database=Vanalytics;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_USERNAME: "${ADMIN_USERNAME}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: "Vanalytics"
      Jwt__Audience: "Vanalytics"
      Jwt__AccessTokenExpirationMinutes: "15"
      Jwt__RefreshTokenExpirationDays: "7"
      ItemImages__BasePath: "/app/item-images"
      AzureStorage__ConnectionString: "${AZURE_STORAGE_CONNECTION_STRING:-}"
    volumes:
      - itemimages:/app/item-images
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: src/Vanalytics.Web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      API_PROXY_TARGET: "http://api:8080"
    depends_on:
      - api

volumes:
  sqldata:
  itemimages:
