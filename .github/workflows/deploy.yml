# Vanalytics CI/CD Pipeline
# Scott McCutchen
# scott.mccutchen@soverance.com
#
# Builds a Docker image, pushes to Azure Container Registry, and deploys
# to Azure Container Apps.
#
# Secrets: ACR_USERNAME, ACR_PASSWORD, AZURE_CREDENTIALS,
#          SQL_CONNECTION_STRING, ADMIN_PASSWORD, JWT_SECRET,
#          AZURE_STORAGE_CONNECTION_STRING,
#          GOOGLE_CLIENT_SECRET, MICROSOFT_CLIENT_SECRET
# Variables: AZURE_RESOURCE_GROUP, ADMIN_EMAIL, ADMIN_USERNAME,
#            JWT_ISSUER, JWT_AUDIENCE,
#            AZURE_AD_CLIENT_ID, AZURE_AD_DOMAIN, AZURE_AD_TENANT_ID,
#            GOOGLE_CLIENT_ID, MICROSOFT_CLIENT_ID

name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Determine version
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            VERSION="1.0.0"
          else
            CURRENT="${LATEST_TAG#v}"
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Clear Docker credentials
        run: docker logout

      - name: Build Docker image
        run: |
          docker build -f src/Vanalytics.Api/Dockerfile . \
            --build-arg APP_VERSION=${{ steps.version.outputs.version }} \
            --build-arg VITE_GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }} \
            --build-arg VITE_MICROSOFT_CLIENT_ID=${{ vars.MICROSOFT_CLIENT_ID }} \
            -t soveranceacr.azurecr.io/vanalytics:v${{ steps.version.outputs.version }} \
            -t soveranceacr.azurecr.io/vanalytics:latest

      - name: Log in to ACR
        uses: docker/login-action@v4
        with:
          registry: soveranceacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push soveranceacr.azurecr.io/vanalytics:v${{ steps.version.outputs.version }}
          docker push soveranceacr.azurecr.io/vanalytics:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Container App secrets
        env:
          SQL_CONN: ${{ secrets.SQL_CONNECTION_STRING }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASSWORD }}
          JWT_SEC: ${{ secrets.JWT_SECRET }}
          AZURE_STORAGE: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          GOOGLE_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MICROSOFT_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
        run: |
          SECRETS=(
            "sql-connection-string=$SQL_CONN"
            "admin-password=$ADMIN_PASS"
            "jwt-secret=$JWT_SEC"
            "azure-storage-connection-string=$AZURE_STORAGE"
          )
          [ -n "$GOOGLE_SECRET" ] && SECRETS+=("google-client-secret=$GOOGLE_SECRET")
          [ -n "$MICROSOFT_SECRET" ] && SECRETS+=("microsoft-client-secret=$MICROSOFT_SECRET")
          az containerapp secret set \
            --name vanalytics \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --secrets "${SECRETS[@]}"

      - name: Deploy to Container App
        env:
          GOOGLE_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MICROSOFT_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
        run: |
          ENV_VARS=(
            "ConnectionStrings__DefaultConnection=secretref:sql-connection-string"
            "ADMIN_EMAIL=${{ vars.ADMIN_EMAIL }}"
            "ADMIN_USERNAME=${{ vars.ADMIN_USERNAME }}"
            "ADMIN_PASSWORD=secretref:admin-password"
            "Jwt__Secret=secretref:jwt-secret"
            "Jwt__Issuer=${{ vars.JWT_ISSUER }}"
            "Jwt__Audience=${{ vars.JWT_AUDIENCE }}"
            "Jwt__AccessTokenExpirationMinutes=15"
            "Jwt__RefreshTokenExpirationDays=7"
            "ASPNETCORE_ENVIRONMENT=Production"
            "DISABLE_HTTPS_REDIRECT=true"
            "Authentication__AzureAd__ClientId=${{ vars.AZURE_AD_CLIENT_ID }}"
            "Authentication__AzureAd__Domain=${{ vars.AZURE_AD_DOMAIN }}"
            "Authentication__AzureAd__TenantId=${{ vars.AZURE_AD_TENANT_ID }}"
            "AzureStorage__ConnectionString=secretref:azure-storage-connection-string"
          )
          if [ -n "$GOOGLE_SECRET" ]; then
            ENV_VARS+=("OAuth__Google__ClientId=${{ vars.GOOGLE_CLIENT_ID }}")
            ENV_VARS+=("OAuth__Google__ClientSecret=secretref:google-client-secret")
          fi
          if [ -n "$MICROSOFT_SECRET" ]; then
            ENV_VARS+=("OAuth__Microsoft__ClientId=${{ vars.MICROSOFT_CLIENT_ID }}")
            ENV_VARS+=("OAuth__Microsoft__ClientSecret=secretref:microsoft-client-secret")
          fi
          az containerapp update \
            --name vanalytics \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image soveranceacr.azurecr.io/vanalytics:v${{ needs.build.outputs.version }} \
            --set-env-vars "${ENV_VARS[@]}"

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, deploy]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create and push tag
        run: |
          git tag "v${{ needs.build.outputs.version }}"
          git push origin "v${{ needs.build.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.build.outputs.version }}"
          name: "v${{ needs.build.outputs.version }}"
          generate_release_notes: true
